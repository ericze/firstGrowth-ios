name: iOS Release Preflight

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  unsigned-archive:
    name: Unsigned Archive Preflight
    runs-on: macos-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Archive (Release, unsigned)
        run: |
          set -euo pipefail
          archive_path="$RUNNER_TEMP/sprout.xcarchive"
          xcodebuild \
            -project sprout.xcodeproj \
            -scheme sprout \
            -configuration Release \
            -destination "generic/platform=iOS" \
            -archivePath "$archive_path" \
            archive \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO

          if [ ! -d "$archive_path" ]; then
            echo "Expected archive not found: $archive_path"
            exit 1
          fi

          echo "ARCHIVE_PATH=$archive_path" >> "$GITHUB_ENV"

      - name: Upload archive artifact
        uses: actions/upload-artifact@v4
        with:
          name: sprout-unsigned-xcarchive
          path: ${{ env.ARCHIVE_PATH }}
          if-no-files-found: error
