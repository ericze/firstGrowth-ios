name: iOS CI

on:
  pull_request:
  push:

concurrency:
  group: ios-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-test-analyze:
    name: Build, Test, Analyze
    runs-on: macos-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Resolve iOS Simulator destination
        id: destination
        run: |
          set -euo pipefail
          line="$(xcodebuild -showdestinations -project sprout.xcodeproj -scheme sprout | awk '/platform:iOS Simulator/ && $0 !~ /placeholder/ { print; exit }')"
          if [ -z "$line" ]; then
            echo "No iOS simulator destination found for scheme sprout."
            exit 1
          fi

          id="$(echo "$line" | sed -E 's/.*id:([^,]+),.*/\1/')"
          echo "destination=id=$id" >> "$GITHUB_OUTPUT"
          echo "Using destination: id=$id"

      - name: Build (Debug)
        run: |
          set -euo pipefail
          xcodebuild \
            -project sprout.xcodeproj \
            -scheme sprout \
            -configuration Debug \
            -destination "${{ steps.destination.outputs.destination }}" \
            build \
            CODE_SIGNING_ALLOWED=NO

      - name: Test (Debug)
        run: |
          set -euo pipefail
          xcodebuild \
            -project sprout.xcodeproj \
            -scheme sprout \
            -configuration Debug \
            -destination "${{ steps.destination.outputs.destination }}" \
            test \
            CODE_SIGNING_ALLOWED=NO

      - name: Static Analysis (Analyze)
        run: |
          set -euo pipefail
          xcodebuild \
            -project sprout.xcodeproj \
            -scheme sprout \
            -configuration Debug \
            -destination "${{ steps.destination.outputs.destination }}" \
            analyze \
            CODE_SIGNING_ALLOWED=NO
